<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arqen — Wall Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0e0e0e;
  color: #d8d8d8;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Left: plan ─────────────────────────────────── */
#plan-panel {
  flex: 1;
  min-width: 0;
  position: relative;
  background: #090909;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#plan-container {
  position: relative;
  line-height: 0;
  max-width: 100%;
  max-height: 100vh;
}

#plan-img {
  display: block;
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
  user-select: none;
}

#overlay-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* ── Right: wall list ───────────────────────────── */
#wall-panel {
  width: 296px;
  min-width: 296px;
  background: #141414;
  border-left: 1px solid #1f1f1f;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#panel-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid #1f1f1f;
  flex-shrink: 0;
}

#panel-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #555;
  display: flex;
  align-items: center;
  gap: 8px;
}

#panel-title span.count {
  background: #222;
  color: #888;
  font-size: 10px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 10px;
  letter-spacing: 0;
}

#panel-meta {
  margin-top: 6px;
  font-size: 11px;
  color: #3d3d3d;
  line-height: 1.6;
}

#wall-list {
  overflow-y: auto;
  flex: 1;
  padding: 4px 0 8px;
}

#wall-list::-webkit-scrollbar { width: 3px; }
#wall-list::-webkit-scrollbar-track { background: transparent; }
#wall-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

/* ── Wall item ──────────────────────────────────── */
.wall-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 18px;
  cursor: default;
  border-left: 2px solid transparent;
  transition: background 60ms, border-color 60ms;
}

.wall-item:hover,
.wall-item.active {
  background: #1c1c1c;
}

.wall-item.active  { border-left-color: var(--accent); }
.wall-item:hover   { border-left-color: #333; }

.wall-icon {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: #1e1e1e;
  border: 1px solid #272727;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wall-icon svg {
  width: 14px;
  height: 14px;
}

.wall-info {
  flex: 1;
  min-width: 0;
}

.wall-name {
  font-size: 12px;
  font-weight: 500;
  color: #c8c8c8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.wall-item.active .wall-name {
  color: #e8e8e8;
}

.wall-length {
  font-size: 11px;
  color: #555;
  margin-top: 1px;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: center;
  gap: 6px;
}

.room-chip {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 9px;
  border: 1px solid;
  letter-spacing: 0.02em;
  font-weight: 500;
}

.wall-id {
  font-size: 10px;
  color: #333;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  letter-spacing: 0.03em;
}

/* ── Tooltip label that follows the highlighted wall ── */
#wall-label {
  position: fixed;
  background: #111;
  border: 1px solid #333;
  color: #ccc;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  pointer-events: none;
  white-space: nowrap;
  display: none;
  z-index: 10;
}
</style>
</head>

d_px": [68, 213], "bbox_px": [1629, 5288, 1864, 5567], "area": "165.2 ft\u00b2", "area_raw": 165.23}, {"id": "R58", "area_px": 58044, "centroid_px": [78, 213], "bbox_px": [1874, 5288, 2109, 5567], "area": "165.1 ft\u00b2", "area_raw": 165.1}, {"id": "R59", "area_px": 55541, "centroid_px": [87, 213], "bbox_px": [2119, 5288, 2347, 5567], "area": "158.0 ft\u00b2", "area_raw": 157.98}, {"id": "R60", "area_px": 57700, "centroid_px": [39, 213], "bbox_px": [889, 5295, 1126, 5567], "area": "164.1 ft\u00b2", "area_raw": 164.12}, {"id": "R61", "area_px": 14152, "centroid_px": [27, 214], "bbox_px": [634, 5393, 813, 5503], "area": "40.3 ft\u00b2", "area_raw": 40.25}];
const HAS_ROOMS   = true;
const IMG_COORD_W = 400;
const IMG_COORD_H = 259;

const img       = document.getElementById('plan-img');
const canvas    = document.getElementById('overlay-canvas');
const ctx       = canvas.getContext('2d');
const wallList  = document.getElementById('wall-list');
const label     = document.getElementById('wall-label');

let selectedIdx = null;

// ── Color palette ─────────────────────────────────────────────────────────
const FACING_COLORS = {
  North: '#4a9eff',
  East:  '#52c98e',
  South: '#ff6b6b',
  West:  '#f0b429',
};

// 18-color palette for rooms — distinguishable on dark background
const ROOM_PALETTE = [
  '#4a9eff', '#52c98e', '#ff6b6b', '#f0b429',
  '#b388ff', '#26c6da', '#ff8a65', '#9ccc65',
  '#ec407a', '#7e57c2', '#ffca28', '#66bb6a',
  '#5c6bc0', '#26a69a', '#ffa726', '#ab47bc',
  '#42a5f5', '#d4e157',
];
const NO_ROOM_COLOR = '#444';

function roomColor(room_id) {
  if (!room_id) return NO_ROOM_COLOR;
  // Hash the room id string to a stable palette index
  let h = 0;
  for (let i = 0; i < room_id.length; i++) h = (h * 31 + room_id.charCodeAt(i)) | 0;
  return ROOM_PALETTE[Math.abs(h) % ROOM_PALETTE.length];
}

function wallColor(wall) {
  if (HAS_ROOMS) return roomColor(wall.room_id);
  return FACING_COLORS[wall.facing] ?? '#888';
}

const FACING_DEG = { North: 0, East: 90, South: 180, West: 270 };

function arrowSVG(facing, color) {
  const deg = FACING_DEG[facing] ?? 0;
  return `<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"
    style="transform:rotate(${deg}deg);transition:transform 0.15s">
    <path d="M7 11 L7 3 M4 6 L7 3 L10 6"
      stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── Draw all walls in their room colors (only when we have rooms) ─────────
function drawAllWalls() {
  if (!HAS_ROOMS) return;
  if (!syncCanvas()) return;
  const { w, h, sx, sy } = cssSize();
  ctx.clearRect(0, 0, w, h);
  WALLS.forEach(wall => {
    const [x1, y1, x2, y2] = wall.px_coords;
    ctx.beginPath();
    ctx.moveTo(x1 * sx, y1 * sy);
    ctx.lineTo(x2 * sx, y2 * sy);
    ctx.strokeStyle = wallColor(wall);
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
  // Room labels at centroids
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ROOMS.forEach(r => {
    const cx = r.centroid_px[0] * sx;
    const cy = r.centroid_px[1] * sy;
    const txt = r.id;
    const w = ctx.measureText(txt).width + 8;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(cx - w/2, cy - 9, w, 18);
    ctx.fillStyle = roomColor(r.id);
    ctx.fillText(txt, cx, cy);
  });
}

// ── Build wall list ────────────────────────────────────────────────────────
WALLS.forEach((wall, i) => {
  const item = document.createElement('div');
  item.className = 'wall-item';
  const c = wallColor(wall);
  item.style.setProperty('--accent', c);
  const roomTag = HAS_ROOMS
    ? `<span class="room-chip" style="background:${c}22;color:${c};border-color:${c}55">${wall.room_id ?? '—'}</span>`
    : '';
  item.innerHTML = `
    <div class="wall-icon">${arrowSVG(wall.facing, c)}</div>
    <div class="wall-info">
      <div class="wall-name">${wall.name}</div>
      <div class="wall-length">${wall.length}${roomTag}</div>
    </div>
    <div class="wall-id">${wall.id}</div>`;

  item.addEventListener('mouseenter', () => highlight(i, item));
  item.addEventListener('mouseleave', () => clear(item));
  item.addEventListener('click', () => {
    if (selectedIdx === i) {
      selectedIdx = null;
      clear(item);
    } else {
      selectedIdx = i;
      highlight(i, item);
    }
  });
  wallList.appendChild(item);
});

// ── Canvas sync ────────────────────────────────────────────────────────────
function syncCanvas() {
  const rect = img.getBoundingClientRect();
  if (!rect.width || !rect.height) return false;   // not laid out yet
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
  // Reset any inline style so CSS width:100%/height:100% governs display size
  canvas.style.width  = '';
  canvas.style.height = '';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return true;
}

function cssSize() {
  const rect = img.getBoundingClientRect();
  return { w: rect.width, h: rect.height,
            sx: rect.width / IMG_COORD_W, sy: rect.height / IMG_COORD_H };
}

// roundRect polyfill for older browsers
function roundRect(x, y, w, h, r) {
  if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); return; }
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ── Highlight one wall ─────────────────────────────────────────────────────
function highlight(idx, item) {
  if (!syncCanvas()) return;
  const { w, h, sx, sy } = cssSize();

  const wall = WALLS[idx];
  const [x1, y1, x2, y2] = wall.px_coords;
  const c = wallColor(wall);

  const px1 = x1 * sx, py1 = y1 * sy;
  const px2 = x2 * sx, py2 = y2 * sy;

  // Dim overlay — use CSS dimensions, not device-pixel canvas.width
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.40)';
  ctx.fillRect(0, 0, w, h);

  // Glow halo
  ctx.beginPath();
  ctx.moveTo(px1, py1);
  ctx.lineTo(px2, py2);
  ctx.strokeStyle = c + '40';
  ctx.lineWidth   = 14;
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Main line
  ctx.strokeStyle = c;
  ctx.lineWidth   = 3;
  ctx.stroke();

  // Endpoint dots
  [[ px1, py1 ], [ px2, py2 ]].forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = c;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Length label — centred on the wall midpoint
  const mx = (px1 + px2) / 2, my = (py1 + py2) / 2;
  const txt = wall.length;
  ctx.font = 'bold 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  const tw = ctx.measureText(txt).width;
  const pad = 6, bh = 20;
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.beginPath();
  roundRect(mx - tw/2 - pad, my - bh/2, tw + pad*2, bh, 4);
  ctx.fill();
  ctx.fillStyle = c;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, mx, my);

  // Active state on list item
  document.querySelectorAll('.wall-item').forEach(el => el.classList.remove('active'));
  item.classList.add('active');
}

function clear(item) {
  item.classList.remove('active');
  if (selectedIdx !== null) {
    const selItem = wallList.children[selectedIdx];
    highlight(selectedIdx, selItem);
  } else {
    if (!syncCanvas()) return;
    const { w, h } = cssSize();
    ctx.clearRect(0, 0, w, h);
    drawAllWalls();
  }
}

// ── Init — defer until the image is actually laid out ──────────────────────
function tryInit() {
  if (!syncCanvas()) { requestAnimationFrame(tryInit); return; }
  drawAllWalls();
}
if (img.complete) { requestAnimationFrame(tryInit); }
else { img.addEventListener('load', () => requestAnimationFrame(tryInit)); }

window.addEventListener('resize', () => {
  if (!syncCanvas()) return;
  const { w, h } = cssSize();
  ctx.clearRect(0, 0, w, h);
  document.querySelectorAll('.wall-item').forEach(el => el.classList.remove('active'));
  drawAllWalls();
});
</script>
