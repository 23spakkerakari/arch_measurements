services:
  - type: web
    name: arqen-cv
    env: python
    rootDir: Arqen
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cv_service:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVICE_SECRET
        generateValue: true   # Render auto-generates; copy into Cloudflare Pages as CV_SERVICE_SECRET
      - key: MAX_ANALYSIS_PX
        value: "2400"         # cap raster size — prevents OOM on free tier during room split
