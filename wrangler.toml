# Cloudflare Workers Builds runs: npx wrangler deploy
# Static UI lives under Arqen/claude_demo/arch-takeoff (see .assetsignore there).
name = "archmeasurements"
compatibility_date = "2024-06-10"
main = "Arqen/claude_demo/arch-takeoff/worker.js"

[assets]
directory = "Arqen/claude_demo/arch-takeoff"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
