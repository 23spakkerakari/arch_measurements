# Cloudflare Workers Builds: npx wrangler versions upload
# Promote to production traffic in the dashboard (or: wrangler versions deploy).
# Worker name must match the dashboard project (archmeasurements).
# Static UI: Arqen/claude_demo/arch-takeoff (see .assetsignore there).
name = "arqen"
compatibility_date = "2024-06-10"
main = "Arqen/claude_demo/arch-takeoff/worker.js"

[assets]
directory = "Arqen/claude_demo/arch-takeoff"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
